# Configuração de serviços para deployment no Render
services:
  # Serviço backend com FastAPI
  - type: web
    name: clientemisterio-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # domínio permitido nas chamadas CORS do backend
      - key: FRONTEND_URL
        value: https://clientemisterio-frontend.onrender.com
      # configuração de SMTP (Brevo)
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        fromSecret: SMTP_USER
      - key: SMTP_PASSWORD
        fromSecret: SMTP_PASSWORD
      - key: SMTP_FROM
        value: no-reply@clientemisterio.com
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"

  # Serviço frontend com Next.js
  - type: web
    name: clientemisterio-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # URL base da API usada no frontend
      - key: NEXT_PUBLIC_API_URL
        value: https://clientemisterio-backend.onrender.com
      # versão do Node usada no Render
      - key: NODE_VERSION
        value: '20'
